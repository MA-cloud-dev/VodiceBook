<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 4 - 现代赤茶</title>
    <style>
        :root {
            --primary-color: #D26945;
            --primary-text: #ffffff;
            --primary-shadow: rgba(210, 105, 69, 0.3);
            --secondary-color: #ffffff;
            --secondary-text: #3A2618;
            --bg-color: #FAF4F0;
            --card-bg: #ffffff;
            --text-color: #5A483D;
            --heading-color: #3A2618;
            --border-color: #F2DCD3;
            --hover-bg: #FDF5F0;
            --input-bg: #ffffff;
            --focus-ring: rgba(210, 105, 69, 0.2);
            --radius: 8px;
            --radius-sm: 4px;
            --shadow: 0 6px 24px rgba(58, 38, 24, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
        }

        h1,
        h2 {
            margin-top: 0;
            color: var(--heading-color);
            font-weight: 600;
        }

        .color-palette {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-box {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: flex-end;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--primary-text);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: var(--secondary-text);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--hover-bg);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 15px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>现代赤茶 (Modern Terracotta)</h1>
        <p>这是您的<strong>第四种风格</strong>示例。使用充满活力的陶土红/赤茶色作为主色，配合暖白色彩不显得刺眼而极富现代美术气息。</p>

        <h2>色彩面板 (Color Palette)</h2>
        <div class="color-palette">
            <div class="color-box" style="background: var(--primary-color);">赤陶土红</div>
            <div class="color-box" style="background: var(--bg-color); color: #333; border: 1px solid #ddd;">微粉调底</div>
            <div class="color-box" style="background: var(--card-bg); color: #333; border: 1px solid #ddd;">白卡片</div>
            <div class="color-box" style="background: var(--text-color);">深暖棕</div>
        </div>

        <h2>按钮 & 图标 (Buttons & Icons)</h2>
        <div class="row">
            <button class="btn btn-primary">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path>
                </svg>
                开始制作
            </button>
            <button class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path>
                </svg>
                更多选项
            </button>
        </div>

        <h2>表单输入 (Form Inputs)</h2>
        <div class="input-group">
            <label>小说名称</label>
            <input type="text" placeholder="输入你想听的小说名称...">
        </div>
    </div>
</body>

</html>
