<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VodiceBook — AI 小说转有声书</title>
    <meta name="description" content="AI驱动的小说转有声书平台，自动角色识别、朗读稿生成、多角色语音合成">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/img/index-illustration.png?v=2">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="/img/index-illustration.png" alt="VodiceBook Logo" class="logo-img">
                <h1>VodiceBook</h1>
            </div>
            <p class="tagline">AI 小说转有声书</p>
            <div class="user-area" style="margin-left:auto; display:flex; align-items:center; gap:12px;">
                <button id="btn-new" class="btn btn-primary" style="display:none; padding:6px 14px; font-size:13px;"
                    onclick="createNewDraft()">新建有声书</button>
                <span id="user-info" style="display:none; color:var(--text-secondary); font-size:14px;"></span>
                <button id="btn-logout" class="btn btn-outline" style="display:none; padding:6px 14px; font-size:13px;"
                    onclick="logout()">退出登录</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 导航栏选项卡 -->
        <div class="nav-tabs">
            <button class="tab-item active" data-tab="upload" onclick="switchTab('upload')">
                <i data-lucide="file-text" class="icon-inline"></i> <span class="tab-label">原文</span>
            </button>
            <button class="tab-item" data-tab="script" onclick="switchTab('script')">
                <i data-lucide="message-square" class="icon-inline"></i> <span class="tab-label">对话</span>
            </button>
            <button class="tab-item" data-tab="audio" onclick="switchTab('audio')">
                <i data-lucide="headphones" class="icon-inline"></i> <span class="tab-label">音频</span>
            </button>
            <button class="tab-item" data-tab="history" onclick="switchTab('history')">
                <i data-lucide="history" class="icon-inline"></i> <span class="tab-label">历史记录</span>
            </button>
        </div>

        <!-- 全局 AI 进度条 -->
        <div id="global-progress" class="global-progress" style="display:none;">
            <div class="gp-row">
                <div class="gp-info">
                    <span class="gp-dot"></span>
                    <span id="gp-label">AI 处理中...</span>
                </div>
                <div class="gp-right">
                    <span id="gp-percent">0%</span>
                    <button id="gp-cancel" class="gp-cancel-btn" onclick="cancelTask()">
                        <i data-lucide="x" class="icon-inline"></i> 取消
                    </button>
                </div>
            </div>
            <div class="gp-track">
                <div id="gp-bar" class="gp-fill"></div>
            </div>
            <div id="gp-error" class="gp-error" style="display:none;"></div>
        </div>

        <!-- 原文视图 -->
        <div id="view-upload" class="tab-pane active">
            <!-- 上传章节 -->
            <section id="section-upload" class="card">
                <h2 class="card-title"><i data-lucide="file-edit" class="icon-inline"></i> 上传章节文本</h2>
                <div class="form-group">
                    <label for="chapter-title">章节标题</label>
                    <input type="text" id="chapter-title" placeholder="例如：第一章 初入江湖" maxlength="128">
                </div>
                <div class="form-group">
                    <label for="chapter-content">章节正文</label>
                    <textarea id="chapter-content" rows="12" placeholder="在此粘贴小说章节文本..."></textarea>
                    <div class="char-count"><span id="word-count">0</span> 字</div>
                </div>
                <button id="btn-upload" class="btn btn-primary" onclick="handleUploadClick()">
                    <i data-lucide="rocket" class="icon-inline"></i> 上传并分析
                </button>
            </section>
        </div>

        <!-- 对话视图：朗读稿预览 -->
        <div id="view-script" class="tab-pane">
            <section id="section-script" class="card">
                <h2 class="card-title"><i data-lucide="book-open" class="icon-inline"></i> 朗读稿预览</h2>

                <div id="script-empty-hint" class="empty-hint">暂无对话稿内容，请先在“原文”页面上传章节并等待分析完毕。</div>
                <div id="script-content-area" style="display: none;">
                    <div id="characters-list" class="characters-list"></div>

                    <!-- 朗读稿操作栏 -->
                    <div class="script-actions">
                        <button id="btn-edit-mode" class="btn btn-secondary" onclick="toggleEditMode()">
                            <i data-lucide="edit-3" class="icon-inline"></i> 编辑朗读稿
                        </button>
                        <button id="btn-save-script" class="btn btn-primary" style="display:none;"
                            onclick="saveScript()">
                            <i data-lucide="check" class="icon-inline"></i> 保存修改
                        </button>
                        <button id="btn-cancel-edit" class="btn btn-outline" style="display:none;"
                            onclick="cancelEdit()">
                            <i data-lucide="x" class="icon-inline"></i> 取消
                        </button>
                        <button id="btn-ai-regen" class="btn btn-outline" onclick="showRegenDialog()">
                            <i data-lucide="bot" class="icon-inline"></i> AI 重新生成
                        </button>
                    </div>

                    <!-- AI 重新生成对话框 -->
                    <div id="regen-dialog" class="regen-dialog" style="display:none;">
                        <label class="regen-label">请描述你的修改意见：</label>
                        <textarea id="regen-instruction" rows="3"
                            placeholder="例如：把第3段旁白改为李逍遥的内心独白；或者：重新分析所有角色的情感"></textarea>
                        <div class="regen-actions">
                            <button id="btn-regen-submit" class="btn btn-primary" onclick="regenerateScript()">
                                <i data-lucide="rocket" class="icon-inline"></i> 提交给 AI
                            </button>
                            <button class="btn btn-outline" onclick="hideRegenDialog()">取消</button>
                        </div>
                    </div>

                    <div id="segments-list" class="segments-list"></div>
                    <div class="action-row">
                        <button id="btn-synthesize" class="btn btn-primary" onclick="handleSynthesisClick()">
                            <i data-lucide="music" class="icon-inline"></i> 开始语音合成
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <!-- 音频视图：生成结果 -->
        <div id="view-audio" class="tab-pane">
            <section id="section-audio" class="card">
                <h2 class="card-title"><i data-lucide="headphones" class="icon-inline"></i> 音频结果</h2>
                <div id="audio-empty-hint" class="empty-hint">暂无生成的音频，请先在“对话”页面点击合成。</div>

                <div id="audio-content-area" style="display: none;">
                    <div class="audio-player-container">
                        <audio id="audio-player" controls class="audio-player"></audio>
                    </div>
                    <div class="action-row">
                        <button id="btn-download" class="btn btn-secondary" onclick="downloadAudio()">
                            <i data-lucide="download" class="icon-inline"></i> 下载音频
                        </button>
                        <button class="btn btn-outline" onclick="resetAll()">
                            <i data-lucide="rotate-ccw" class="icon-inline"></i> 重新开始
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <!-- 历史记录视图 -->
        <div id="view-history" class="tab-pane">
            <section id="section-history" class="card">
                <div class="history-header">
                    <h2 class="card-title"><i data-lucide="history" class="icon-inline"></i> 任务历史</h2>
                    <!-- 默认入口按钮 -->
                    <button id="btn-batch-mode" class="btn btn-sm btn-outline" style="display:none;"
                        onclick="enterBatchMode()">
                        <i data-lucide="check-square" class="icon-inline"></i> 批量管理
                    </button>
                    <!-- 批量操作栏（进入批量模式后显示） -->
                    <div id="batch-actions" class="history-actions" style="display:none;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="history-select-all" onchange="toggleSelectAll(this)">
                            <span>全选</span>
                        </label>
                        <button class="btn btn-sm btn-danger" onclick="confirmBatchDelete()">
                            <i data-lucide="trash-2" class="icon-inline"></i> 删除选中 (<span id="selected-count">0</span>)
                        </button>
                        <button class="btn btn-sm btn-outline" onclick="exitBatchMode()">取消</button>
                    </div>
                </div>
                <div id="task-history" class="task-history">
                    <p class="empty-hint">暂无历史任务</p>
                </div>
            </section>
        </div>

        <!-- 删除确认弹窗 -->
        <div id="confirm-dialog" class="confirm-overlay" style="display:none;">
            <div class="confirm-box">
                <h3><i data-lucide="alert-triangle" class="icon-inline"></i> 确认删除</h3>
                <p id="confirm-msg">确定要删除选中的任务吗？此操作不可恢复。</p>
                <div class="confirm-actions">
                    <button class="btn btn-outline" onclick="hideConfirmDialog()">取消</button>
                    <button class="btn btn-danger" id="confirm-delete-btn" onclick="executeDelete()">确认删除</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>VodiceBook © 2026 — Powered by SiliconFlow LLM + QwenTTS</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>

</html>
