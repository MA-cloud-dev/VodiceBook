<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — VodiceBook</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/img/index-illustration.png?v=2">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0F4F2 0%, #E3EDE8 100%);
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #D2E0DA;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(44, 62, 56, 0.06);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            display: block;
            margin: 0 auto 16px auto;
            border-radius: 24px;
            mix-blend-mode: multiply;
        }

        .login-logo h1 {
            color: #2C3E38;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .login-logo p {
            color: #4A5D54;
            font-size: 14px;
            margin-top: 4px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            color: #4A5D54;
            font-size: 13px;
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
        }

        .login-form input {
            width: 100%;
            padding: 12px 16px;
            background: #F0F4F2;
            border: 1px solid #D2E0DA;
            border-radius: 10px;
            color: #2C3E38;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .login-form input:focus {
            outline: none;
            border-color: #5A7D6C;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(90, 125, 108, 0.2);
        }

        .login-form input::placeholder {
            color: #8EACA0;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5A7D6C 0%, #4A6D5C 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(90, 125, 108, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: #C26B63;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .spinner-login {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="/img/login-illustration.png" alt="VodiceBook Illustration" class="logo-img">
                <h1>VodiceBook</h1>
                <p>AI 小说转有声书</p>
            </div>
            <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">登 录</button>
                <div class="login-error" id="login-error"></div>
            </form>
        </div>
    </div>
    <script src="/js/login.js"></script>
</body>

</html>
