server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:vodicebook}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  storage:
    base-path: ./storage
  jwt:
    secret: ${JWT_SECRET:VodiceBook2026SecretKeyForJwtTokenSigningMustBeLongEnough256Bits!!}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  test-user:
    username: ${TEST_USERNAME:admin}
    password: ${TEST_PASSWORD:123456}

llm:
  api-url: https://api.siliconflow.cn/v1/chat/completions
  api-key: ${LLM_API_KEY}
  model: ${LLM_MODEL:deepseek-ai/DeepSeek-V3}
  max-tokens: ${LLM_MAX_TOKENS:8192}
  temperature: 0.3
  timeout-seconds: 120

tts:
  api-url: ${TTS_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
  api-key: ${TTS_API_KEY}
  model: ${TTS_MODEL:qwen3-tts-flash}
  output-format: wav
  sample-rate: 24000
  segment-pause-ms: 500
